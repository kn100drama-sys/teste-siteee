<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrando no Grupo...</title>

<meta http-equiv="refresh" content="3;url=https://chat.whatsapp.com/DV3EHvRpVet1EIt0vbXDf9?s=sw&p=a&ilr=2">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#075E54,#128C7E,#25D366);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:rgba(255,255,255,.08);
    border-radius:50%;
    top:-250px;
    right:-200px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,.05);
    border-radius:50%;
    bottom:-220px;
    left:-180px;
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:430px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:24px;
    padding:40px;
    text-align:center;
    color:#fff;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.logo{
    width:95px;
    height:95px;
    margin:auto;
    border-radius:50%;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:52px;
    margin-bottom:25px;
    animation:pulse 1.8s infinite;
}

h1{
    font-size:30px;
    margin-bottom:15px;
}

p{
    font-size:17px;
    opacity:.95;
    line-height:1.6;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    width:100%;
    background:#25D366;
    color:#fff;
    text-decoration:none;
    padding:18px;
    border-radius:14px;
    font-size:19px;
    font-weight:bold;
    transition:.25s;
}

.btn:hover{
    transform:translateY(-3px);
    background:#1fb458;
}

.small{
    margin-top:18px;
    font-size:14px;
    opacity:.8;
}

.loader{
    width:60px;
    height:60px;
    border-radius:50%;
    border:5px solid rgba(255,255,255,.2);
    border-top:5px solid #fff;
    margin:25px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}
</style>
</head>
<body>

<div class="card">

<div class="logo">💬</div>

<h1>Entrando no Grupo</h1>

<p>
Você será redirecionado automaticamente para nosso grupo do WhatsApp em alguns segundos.
</p>

<div class="loader"></div>

<a class="btn" href="https://chat.whatsapp.com/DV3EHvRpVet1EIt0vbXDf9?s=sw&p=a&ilr=2">
🚀 Entrar Agora
</a>

<div class="small">
Caso o redirecionamento não aconteça, clique no botão acima.
</div>

</div>

<script>
const link = "https://chat.whatsapp.com/DV3EHvRpVet1EIt0vbXDf9?s=sw&p=a&ilr=2";

setTimeout(()=>{
    window.location.href = link;
},3000);
</script>

</body>
</html>
